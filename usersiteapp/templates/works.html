{% extends 'conntoapp/userbase/userbase.html' %}
{% load static %}

{% block title %}
  {{ user.fullname }}
{% endblock %}

{% block content %}
  <section class="projects-area">
    <div class="container">
      <h1 class="section-heading" data-aos="fade-up">
        <img src="{% static 'userstatic/assets/images/star-2.png' %}" alt="Star" />
        All Projects
        <img src="{% static 'userstatic/assets/images/star-2.png' %}" alt="Star" />
      </h1>
      <div class="row">
        {% for work in user.userworks.all %}
          <div class="col-md-4 col-sm-6 mb-4" data-aos="zoom-in">
            <div class="project-item shadow-box">
              <a class="overlay-link" href="{% url "workDetail" user.id work.work_name %}"></a>
              <img src="{% static 'userstatic/assets/images/bg1.png' %}" alt="BG" class="bg-img" />
              <div class="project-img">
                <img class="workImage" src="{{work.work_image1.url}}" alt="Project" />
              </div>
              <div class="d-flex align-items-center justify-content-between">
                <div class="project-info">
                  <p>{{ work.work_service }}</p>
                  <h1>{{ work.work_name }}</h1>
                </div>
                <a href="{% url "workDetail" user.id work.work_name %}" class="project-btn"><img src="{% static 'userstatic/assets/images/icon.svg' %}" alt="Button" /></a>
              </div>
            </div>
          </div>
        {% endfor %}
      </div>
    </div>
  </section>
{% endblock %}
