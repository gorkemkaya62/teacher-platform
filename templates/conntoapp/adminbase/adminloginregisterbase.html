{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <title>{% block title %}{{ SITE_NAME }}{% endblock title %}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'adminstatic/css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'adminstatic/css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'edu-theme.css' %}?v=13" />
    {% block css_files %}{% endblock css_files %}
</head>
<body class="connto-auth-page connto-chalkboard-page">
    {% block content %}{% endblock content %}
    <script src="{% static 'adminstatic/js/jquery.min.js' %}"></script>
    <script src="{% static 'adminstatic/js/bootstrap.min.js' %}"></script>
    {% block js_files %}{% endblock js_files %}
</body>
</html>
