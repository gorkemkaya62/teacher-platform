<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Türkiye haritası ana hatları -->
    <path d="M50,200 C100,150 200,100 300,100 C400,100 500,150 600,150 C700,150 750,200 750,200 C750,250 700,300 600,300 C500,300 400,250 300,250 C200,250 100,250 50,200 Z" 
          fill="#f5f5f5" stroke="#333" stroke-width="2"/>
    
    <!-- Örnek şehir noktaları (gerçek koordinatlar eklenecek) -->
    <g id="cities">
        <!-- İstanbul -->
        <circle data-city="Istanbul" cx="300" cy="150" r="5" fill="#333"/>
        <text x="310" y="155" font-size="12">İstanbul</text>
        
        <!-- Ankara -->
        <circle data-city="Ankara" cx="400" cy="200" r="5" fill="#333"/>
        <text x="410" y="205" font-size="12">Ankara</text>
        
        <!-- İzmir -->
        <circle data-city="Izmir" cx="200" cy="250" r="5" fill="#333"/>
        <text x="210" y="255" font-size="12">İzmir</text>
        
        <!-- Antalya -->
        <circle data-city="Antalya" cx="350" cy="300" r="5" fill="#333"/>
        <text x="360" y="305" font-size="12">Antalya</text>
        
        <!-- Bursa -->
        <circle data-city="Bursa" cx="280" cy="180" r="5" fill="#333"/>
        <text x="290" y="185" font-size="12">Bursa</text>
        
        <!-- Adana -->
        <circle data-city="Adana" cx="500" cy="280" r="5" fill="#333"/>
        <text x="510" y="285" font-size="12">Adana</text>
        
        <!-- Diğer şehirler buraya eklenebilir -->
    </g>
</svg> 